spring:
  application:
    name: statistics-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/statistics_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8083

logging:
  level:
    com.carrental.statistics: DEBUG
    org.springframework.amqp: DEBUG
