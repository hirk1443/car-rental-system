spring:
  application:
    name: statistics-service
  
  datasource:
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:statistics_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8083

logging:
  level:
    com.carrental.statistics: DEBUG
    org.springframework.amqp: DEBUG
