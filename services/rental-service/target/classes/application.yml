spring:
  application:
    name: rental-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/rental_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8081

logging:
  level:
    com.carrental.rental: DEBUG
    org.springframework.amqp: DEBUG
