apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: car-rental
type: Opaque
stringData:
  # Database Passwords
  DATABASE_PASSWORD: "postgres123"
  
  # RabbitMQ Password
  RABBITMQ_PASSWORD: "guest"
  
  # Redis Password (optional, comment out if not using password)
  # REDIS_PASSWORD: "redis-password"
  
  # JWT Secret for Authentication
  JWT_SECRET: "car-rental-jwt-secret-key-change-in-production"
  
  # Payment Gateway API Key (Mock for now)
  PAYMENT_GATEWAY_API_KEY: "mock-payment-api-key"
