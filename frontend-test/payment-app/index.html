<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 Payment Management - Quản lý thanh toán</title>
    <link rel="stylesheet" href="../rental-app/style.css">
    <style>
        header h1 { color: #48bb78; }
        .tab.active { background: #48bb78; }
        .rental-item { border-left-color: #48bb78; }
        .rental-header strong { color: #48bb78; }
        .card h2 { color: #48bb78; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💳 Payment Management System</h1>
            <p>Hệ thống quản lý thanh toán</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab('create')">➕ Tạo thanh toán</button>
            <button class="tab" onclick="showTab('list')">📋 Danh sách</button>
            <button class="tab" onclick="showTab('process')">⚙️ Xử lý</button>
            <button class="tab" onclick="showTab('invoice')">🧾 Invoice</button>
        </div>

        <!-- CREATE PAYMENT -->
        <div id="create-tab" class="tab-content active">
            <div class="card">
                <h2>➕ Tạo thanh toán mới</h2>
                <form id="create-form">
                    <div class="form-group">
                        <label>Rental:</label>
                        <div class="filter-bar">
                            <select id="rentalSelect" required>
                                <option value="">-- Chọn rental --</option>
                            </select>
                            <button type="button" onclick="loadRentalsForCreate()" class="btn btn-success">🔄</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Customer ID:</label>
                        <input type="text" id="customerId" placeholder="Tự động theo rental" required readonly>
                    </div>
                    <div class="form-group">
                        <label>Loại thanh toán:</label>
                        <select id="paymentType" required>
                            <option value="RENTAL_FEE">RENTAL_FEE - Tiền thuê</option>
                            <option value="DEPOSIT">DEPOSIT - Đặt cọc</option>
                            <option value="PENALTY">PENALTY - Phạt</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Số tiền (VND):</label>
                        <input type="number" id="amount" value="500000" required>
                    </div>
                    <div class="form-group">
                        <label>Phương thức:</label>
                        <select id="paymentMethod" required>
                            <option value="CASH">CASH - Tiền mặt</option>
                            <option value="CREDIT_CARD">CREDIT_CARD - Thẻ tín dụng</option>
                            <option value="DEBIT_CARD">DEBIT_CARD - Thẻ ghi nợ</option>
                            <option value="BANK_TRANSFER">BANK_TRANSFER - Chuyển khoản</option>
                            <option value="E_WALLET">E_WALLET - Ví điện tử</option>
                            <option value="QR_CODE">QR_CODE - QR Code</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mô tả:</label>
                        <textarea id="description" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Tạo thanh toán</button>
                </form>
            </div>
        </div>

        <!-- LIST PAYMENTS -->
        <div id="list-tab" class="tab-content">
            <div class="card">
                <h2>📋 Danh sách thanh toán</h2>
                <div class="filter-bar">
                    <select id="statusFilter">
                        <option value="">Tất cả trạng thái</option>
                        <option value="PENDING">PENDING - Chờ xử lý</option>
                        <option value="PROCESSING">PROCESSING - Đang xử lý</option>
                        <option value="COMPLETED">COMPLETED - Hoàn tất</option>
                        <option value="FAILED">FAILED - Thất bại</option>
                        <option value="REFUNDED">REFUNDED - Đã hoàn tiền</option>
                        <option value="PARTIALLY_REFUNDED">PARTIALLY_REFUNDED - Hoàn một phần</option>
                    </select>
                    <select id="rentalIdFilter">
                        <option value="">Tất cả rental</option>
                    </select>
                    <button onclick="loadPayments()" class="btn btn-success">🔄 Tải lại</button>
                </div>
                <div id="payments-list"></div>
            </div>
        </div>

        <!-- PROCESS PAYMENT -->
        <div id="process-tab" class="tab-content">
            <div class="card">
                <h2>⚙️ Xử lý thanh toán</h2>
                
                <h3>✅ Xử lý thanh toán</h3>
                <form id="process-form">
                    <div class="form-group">
                        <label>Payment ID:</label>
                        <input type="text" id="processPaymentId" required>
                    </div>
                    <div class="form-group">
                        <label>Transaction Reference:</label>
                        <input type="text" id="transactionReference" value="TXN-12345" required>
                    </div>
                    <div class="form-group">
                        <label>Notes:</label>
                        <input type="text" id="processNotes" value="Processed from frontend-test">
                    </div>
                    <button type="submit" class="btn btn-primary">Xử lý thanh toán</button>
                </form>

                <h3>💸 Hoàn tiền (Payment -> REFUND)</h3>
                <form id="refund-form">
                    <div class="form-group">
                        <label>Payment ID cần hoàn tiền:</label>
                        <input type="text" id="refundPaymentId" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Số tiền hoàn:</label>
                            <input type="number" id="refundAmount" value="100000" required>
                        </div>
                        <div class="form-group">
                            <label>Lý do:</label>
                            <input type="text" id="refundReason" value="Customer request">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning">Tạo refund</button>
                </form>
            </div>
        </div>

        <!-- INVOICE TAB -->
        <div id="invoice-tab" class="tab-content">
            <div class="card">
                <h2>🧾 Invoice Lifecycle</h2>

                <h3>➕ Tạo invoice</h3>
                <form id="invoice-form">
                    <div class="form-group">
                        <label>Rental:</label>
                        <div class="filter-bar">
                            <select id="invoiceRentalSelect" required>
                                <option value="">-- Chọn rental --</option>
                            </select>
                            <button type="button" onclick="loadRentalsForCreate()" class="btn btn-success">🔄</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Customer ID:</label>
                        <input type="text" id="invoiceCustomerId" placeholder="Tự động theo rental" required readonly>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Rental Fee:</label>
                            <input type="number" id="invoiceRentalFee" value="500000">
                        </div>
                        <div class="form-group">
                            <label>Deposit:</label>
                            <input type="number" id="invoiceDeposit" value="200000">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Penalty Amount:</label>
                        <input type="number" id="invoicePenalty" value="0">
                    </div>
                    <div class="form-group">
                        <label>Notes:</label>
                        <textarea id="invoiceNotes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Tạo invoice</button>
                </form>

                <h3>⚙️ Thao tác invoice</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Invoice ID:</label>
                        <input type="text" id="invoiceIdAction" placeholder="Nhập invoiceId">
                    </div>
                    <div class="form-group">
                        <label>Số tiền penalty/refund:</label>
                        <input type="number" id="invoiceAmountAction" value="100000">
                    </div>
                </div>
                <div class="actions-grid">
                    <button onclick="performInvoiceAction('penalty')" class="btn btn-warning">➕ Cập nhật penalty</button>
                    <button onclick="performInvoiceAction('paid')" class="btn btn-success">✅ Mark paid</button>
                    <button onclick="performInvoiceAction('refund')" class="btn btn-info">💸 Add refund</button>
                    <button onclick="loadInvoices()" class="btn">🔄 Tải invoice</button>
                </div>

                <div id="invoices-list"></div>
            </div>
        </div>

        <!-- RESPONSE DISPLAY -->
        <div id="response" class="response"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
